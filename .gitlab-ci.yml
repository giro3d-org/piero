default:
    image: node:lts-alpine
    before_script:
        - cp config.ts.sample config.ts
        - cp styles.ts.sample styles.ts
        - apk update
        - apk add git
        - npm install --force

stages:
    - build
    - publish

variables:
    publish_packages_tag: '/^packages-v([0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.\d+)?)$/'
    publish_app_tag: '/^app-v([0-9]+)\.([0-9]+)\.([0-9]+)$/'

# Run pipelines on MR, tags and push on 'main'
workflow:
    rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
        - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_TAG
        - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:
    stage: build
    script:
        - npm run lint

test:
    stage: build
    script:
        - npm run test

build:
    stage: build
    script:
        - npm run build

build-docker-image:
    variables:
        DOCKER_TLS_CERTDIR: '/certs'
    image: docker:latest
    services:
        - docker:dind
    before_script:
        - docker info
    stage: build
    script:
        - docker build -t piero:latest .

pages:
    stage: publish
    rules:
        - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ $publish_app_tag
          variables:
              ENVIRONMENT_NAME: $CI_COMMIT_TAG
        - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          variables:
              ENVIRONMENT_NAME: $CI_COMMIT_BRANCH
    variables:
        DEPLOY_URL: https://piero.giro3d.org
        OUTPUT: ./dist
    environment:
        name: pages/$ENVIRONMENT_NAME
        action: start
        url: $DEPLOY_URL
    artifacts:
        paths:
            - dist
        name: $ENVIRONMENT_NAME
    publish: dist
    script:
        - npm run build -- --out-dir $OUTPUT --base $DEPLOY_URL

publish_packages:
    stage: publish
    interruptible: false
    retry: 1
    script:
        - channel="$(node build/get-version-tag.mjs packages ${CI_COMMIT_TAG})"
        - npm config set -- '//registry.npmjs.org/:_authToken' "${NPM_AUTH_TOKEN}"
        - for dir in packages/*; do npm publish ./$dir --access public --tag ${channel}; done;
    rules:
        - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ $publish_packages_tag'
