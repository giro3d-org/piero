image: node:lts-alpine
before_script:
    - cp src/config.json.sample src/config.json
    - npm i

pages-test:
    stage: build
    script:
        - npm run build
    only:
        - merge_requests

pages:
    stage: build
    rules:
        - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          variables:
              DEPLOY_URL: $CI_PAGES_URL
              OUTPUT: ./dist
    cache:
        key: gitlab-pages
        paths:
            - node_modules
    environment:
        name: pages/$CI_COMMIT_BRANCH
        action: start
        url: $DEPLOY_URL
    artifacts:
        paths:
            - dist
        name: $CI_COMMIT_BRANCH
    publish: dist
    script:
        - npm run build -- --out-dir $OUTPUT --base $DEPLOY_URL
