image: node:lts-alpine
before_script:
    - npm i

pages-test:
    stage: build
    script:
        - npm run build
    only:
        - merge_requests

pages:
    stage: build
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
          variables:
              DEPLOY_URL: $CI_PAGES_URL
              OUTPUT: ./dist/$CI_COMMIT_BRANCH
        - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "next"
          variables:
              DEPLOY_URL: $CI_PAGES_URL/$CI_COMMIT_BRANCH
              OUTPUT: ./dist/$CI_COMMIT_BRANCH
    cache:
        key: gitlab-pages
        paths: [dist]
    environment:
        name: pages/$CI_COMMIT_BRANCH
        action: start
        url: $DEPLOY_URL
    artifacts:
        paths:
            - dist
        name: build
    publish: dist
    script:
        - ls dist
        - npm run build -- --out-dir tempbuild --base $DEPLOY_URL
        - rm -fr $OUTPUT
        - mv tempbuild $OUTPUT
