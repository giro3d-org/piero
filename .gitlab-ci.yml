image: node:lts-alpine
before_script:
    - npm i

pages-test:
    stage: build
    script:
        - npm run build
    only:
        - merge_requests

pages:
    stage: build
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
          variables:
              DEPLOY_URL: $CI_PAGES_URL
              OUTPUT: ./public/$CI_COMMIT_BRANCH
        - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "next"
          variables:
              DEPLOY_URL: $CI_PAGES_URL/$CI_COMMIT_BRANCH
              OUTPUT: ./public/$CI_COMMIT_BRANCH
    cache:
        key: gitlab-pages
        paths: [public]
    environment:
        name: pages/$CI_COMMIT_BRANCH
        action: start
        url: $DEPLOY_URL
    artifacts:
        paths:
            - public
        name: "$CI_COMMIT_REF_SLUG"
    publish: public
    script:
        - npm run build -- --out-dir $OUTPUT --base $DEPLOY_URL
