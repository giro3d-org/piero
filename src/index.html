<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giro3D Sample Application</title>
    <link rel="stylesheet" href="app.scss" />
    <link rel="stylesheet" href="../node_modules/shepherd.js/dist/css/shepherd.css" />
</head>

<body>
    <div id="main-container" class="d-flex flew-row position-absolute top-0 bottom-0 start-0 end-0 p-0 m-0">
        <div id="viewerDiv" class="flex-grow-1 h-100 p-0 m-0"></div>
        <!-- <div id="panelDiv" class="position-absolute top-0 left-0 mh-100 overflow-auto"></div> -->
        <div id="layers" class="position-absolute top-0 left-0 mh-100 mw-25 overflow-auto bg-light p-0 accordion">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button py-1" type="button" data-bs-toggle="collapse"
                        data-bs-target="#layer-list-container" aria-expanded="true"
                        aria-controls="layer-list-container">
                        Layers
                    </button>
                </h2>
                <div id="layer-list-container" class="accordion-collapse collapse show">
                    <ul id="layer-list" class="list-group list-group-flush"></ul>
                </div>
            </div>
            <div class="accordion-item" id="annotation-drop">
                <h2 class="accordion-header">
                    <button class="accordion-button py-1" type="button" data-bs-toggle="collapse"
                        data-bs-target="#annotation-list-container" aria-expanded="true"
                        aria-controls="annotation-list-container">
                        Annotations
                    </button>
                </h2>
                <div id="annotation-list-container" class="accordion-collapse collapse show">
                    <ul id="annotation-list" class="list-group list-group-flush"></ul>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button py-1" type="button" data-bs-toggle="collapse"
                        data-bs-target="#overlays-list-container" aria-expanded="true"
                        aria-controls="overlays-list-container">
                        Overlays
                    </button>
                </h2>
                <div id="overlays-list-container" class="accordion-collapse collapse show">
                    <ul id="overlays-list" class="list-group list-group-flush">
                        <li id="overlay-gml" class="list-group-item py-0 px-1">
                            <a href="#" title="Hide this overlay"
                                class="link-dark link-opacity-50 link-opacity-100-hover layer-toggle-visible-link"><i
                                    class="bi bi-eye"></i></a>
                            Fontaines (gml)
                        </li>
                        <li id="overlay-gpx" class="list-group-item py-0 px-1">
                            <a href="#" title="Hide this overlay"
                                class="link-dark link-opacity-50 link-opacity-100-hover layer-toggle-visible-link"><i
                                    class="bi bi-eye"></i></a>
                            Footpath (gpx)
                        </li>
                        <li id="overlay-kml" class="list-group-item py-0 px-1">
                            <a href="#" title="Hide this overlay"
                                class="link-dark link-opacity-50 link-opacity-100-hover layer-toggle-visible-link"><i
                                    class="bi bi-eye"></i></a>
                            Sytral lines (kml)
                        </li>
                        <li id="overlay-geojson" class="list-group-item py-0 px-1">
                            <a href="#" title="Hide this overlay"
                                class="link-dark link-opacity-50 link-opacity-100-hover layer-toggle-visible-link"><i
                                    class="bi bi-eye"></i></a>
                            Canopée (geojson)
                        </li>
                    </ul>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button py-1" type="button" data-bs-toggle="collapse"
                        data-bs-target="#basemap-list-container" aria-expanded="true"
                        aria-controls="basemap-list-container">
                        Basemaps
                    </button>
                </h2>
                <div id="basemap-list-container" class="accordion-collapse collapse show">
                    <ul id="basemap-list" class="list-group list-group-flush">
                        <li id="basemap" class="list-group-item py-0 px-1 d-flex justify-content-between align-items-start">
                            <div class="ms-2 me-auto">
                                <a href="#" title="Zoom on this layer"
                                    class="layer-link link-underline-success link-underline-opacity-0 link-underline-opacity-75-hover">
                                    Base map
                                </a>
                                <a href="#" title="Expand this layer"
                                    class="link-secondary link-opacity-50 link-opacity-100-hover layer-expand-link"><i
                                        class="bi bi-arrows-angle-expand"></i></a>
                                <a href="#" title="Change provider"
                                    class="link-secondary link-opacity-50 link-opacity-100-hover layer-provider-link"><i
                                        class="bi bi-braces-asterisk"></i></a>
                            </div>
                            <span id="basemap-progress" class="badge bg-info">
                                <div class="spinner-border spinner-border-sm" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div id="overlay" class="position-absolute top-0 end-0 bg-light d-none">
            <ul>
                <li><a href="pg_featureserv/">pg_featureserv</a></li>
                <li><a href="pg_tileserv/">pg_tileserv</a></li>
                <li><a href="qgis/courseau/">QGIS server</a></li>
            </ul>
        </div>
        <div id="loading" class="px-1 position-absolute start-0 bottom-0 text-secondary bg-light d-flex">
            <div>Loading in progress...</div>
        </div>
        <div id="loading-progress" class="progress position-absolute start-0 top-0 end-0" style="height: 4px"
            role="progressbar" aria-label="Animated striped example" aria-valuenow="75" aria-valuemin="0"
            aria-valuemax="100">
            <div id="loading-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-info"
                style="width: 75%"></div>
        </div>
        <div id="coordinates" class="px-1 position-absolute bottom-0 text-secondary bg-light" style="right: 25vw"></div>
        <div id="tooltip" class="px-1 text-secondary bg-light d-none">Hello</div>
        <div class="bg-light mh-100 d-flex flex-column vw-25">
            <div id="attributes" class="flex-grow-1 overflow-auto"></div>
            <hr />
            <div id="measurement">
                <div class="d-flex flex-row">
                    <button id="measure-line" type="button" class="btn btn-outline-secondary flex-fill mx-2">Measure
                        with
                        line</button>
                    <button id="measure-polygon" type="button" class="btn btn-outline-secondary flex-fill mx-2">Measure
                        with
                        polygon</button>
                </div>
                <form id="measure-options" class="row mx-2 align-items-center">
                    <div class="col-sm">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="enableSnapTo">
                            <label class="form-check-label" for="enableSnapTo">
                                Snap to
                            </label>
                        </div>
                    </div>
                    <div class="col">
                        <label class="visually-hidden" for="snapToObject">Snap to object</label>
                        <select class="form-select" id="snapToObject">
                            <option value="basemap" selected>Base map</option>
                        </select>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="alerts" class="position-absolute top-0 start-20 end-20 d-none"></div>

    <script type="module" src="index.js"></script>
</body>

</html>
